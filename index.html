<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JS Trace Table </title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1 class="title">JS Trace Table</h1>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <textarea id="code">
let sum = 0;

for(let i = 1; i <= 5; i++){
    sum = sum + i;
}

console.log(sum);
        </textarea>

        <button class="runBtn" onclick="runCode()">RUN ▶</button>

        <div class="outputBox">
            <h3>Output</h3>
            <pre id="output"></pre>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>Trace Table</h3>

        <table>
            <thead id="tableHead"></thead>
            <tbody id="traceTable"></tbody>
        </table>

        <div class="navButtons">
            <button onclick="prevStep()">⬅ Prev</button>
            <button onclick="nextStep()">Next ➡</button>
        </div>
    </div>

</div>
<br>
<div>
<center>
    <p>I am <a href="https://github.com/AnisurRahmanJU" target="_blank">Md. Anisur Rahman.</a> I am a developer of this project<a href="index.html">(JS Trace Table) </a></p>
</center>
</div>

<script src="tracing.js"></script>

<script>
let editor = CodeMirror.fromTextArea(document.getElementById("code"), {
    mode: "javascript",
    lineNumbers: true
});
</script>

</body>
</html>
